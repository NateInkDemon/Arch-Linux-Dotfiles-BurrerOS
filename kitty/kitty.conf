# --- Tipografía ---
# Asegúrate de tener instalada 'ttf-firacode-nerd' o 'ttf-jetbrains-mono-nerd'
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Transparencia y Blur ---
# Esto trabaja junto con el 'blur' que pusimos en Hyprland
background_opacity         0.85
dynamic_background_opacity yes

# --- Ventana ---
window_padding_width 10
confirm_os_window_close 0
hide_window_decorations yes

# --- Colores (Estilo Nord/Dark) ---
background #1a1b26
foreground #a9b1d6
cursor     #c0caf5

# Colores de la terminal (Basado en tu video)
color0  #15161e
color8  #414868
color1  #f7768e
color9  #f7768e
color2  #9ece6a
color10 #9ece6a
color3  #e0af68
color11 #e0af68
color4  #7aa2f7
color12 #7aa2f7
color5  #bb9af7
color13 #bb9af7
color6  #7dcfff
color14 #7dcfff
color7  #a9b1d6
color15 #c0caf5
