[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "alphabetical"
sort_dir_first = true
preview_method = "kitty" 

[opener]
edit = [
    { run = 'nano "$@"', block = true, desc = "Editar con Nano" }
]
play = [
    { run = 'imv "$@"', detach = true, desc = "Ver imagen con imv" }
]

[open]
rules = [
    { mime = "text/*",  use = "edit" },
    { mime = "image/*", use = "play" },
    { name = "*.conf", use = "edit" },
    { name = "*.ron",  use = "edit" }
]

[preview]
max_width  = 600
max_height = 900
