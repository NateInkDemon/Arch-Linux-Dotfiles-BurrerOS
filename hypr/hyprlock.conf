general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/usuario/Wallpapers/*.jpg
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(136, 192, 208, 1.0)
    font_size = 100
    font_family = Noto Sans Bold
    position = 0, 150
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(46, 52, 64)
    inner_color = rgb(236, 239, 244)
    font_color = rgb(46, 52, 64)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
