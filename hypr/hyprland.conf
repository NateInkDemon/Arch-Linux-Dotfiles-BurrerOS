source = ~/.cache/wal/colors-hyprland.conf

monitor=,highres,auto,1

exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = sh ~/.config/hypr/scripts/wallpaper.sh &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = rm -f $XDG_RUNTIME_DIR/wob.fifo && mkfifo $XDG_RUNTIME_DIR/wob.fifo && tail -f $XDG_RUNTIME_DIR/wob.fifo | wob
exec-once = swaync
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = nm-applet --indicator
exec-once = mpd
exec-once = mpd-mpris &
exec-once = sh ~/.config/swaync/random_sddm.sh
exec-once = bash ~/.config/waybar/scripts/switch_waybar.sh random
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESERT=Hyprland
exec-once = awww-daemon

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

general {
    resize_on_border = true
    extend_border_grab_area = 20
    hover_icon_on_border = true
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = $color4 $color2 45deg
    col.inactive_border = $background
}

decoration {
    rounding = 15
    active_opacity = 0.9
    inactive_opacity = 0.8

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, myBezier, slide
    animation = windowsIn, 1, 4, myBezier, slide
    animation = windowsOut, 1, 4, myBezier, slide
    animation = border, 1, 5, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, wind, slide
}

windowrule {
    name = rofi_mini_terminal
    match:class = ^(rofi_terminal)$
    float = on
    size = 600 400
    center = on
    opacity = 0.9
}

windowrule {
    name = floating_tui_apps
    match:class = ^(floating_tui)$
    float = on
    size = 700 500
    center = on
}

windowrule {
    name = bluetooth_manager
    match:class = ^(blueman-manager)$
    float = on
    size = 600 400
    center = on
}

$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, yazi
bind = $mainMod, B, exec, app.zen_browser.zen
bind = $mainMod, M, exec, gtk-launch rmpc
bind = $mainMod, T, togglefloating,
bind = $mainMod, D, exec, rofi -show drun -display-drun "❄️ Apps"
bind = $mainMod, F, fullscreen
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/powermenu.sh

bind = $mainMod, G, exec, rofimoji --action type
bind = $mainMod, W, exec, /home/jpablo/.config/hypr/scripts/wallpaper.sh
bind = $mainMod, O, exec, bash /home/jpablo/.config/waybar/scripts/switch_waybar.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.fifo
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.fifo
binde = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

binde = , XF86MonBrightnessUp, exec, brightnessctl set +5% | sed -En 's/.*\( ([0-9]+)%\).*/\1/p' > $XDG_RUNTIME_DIR/wob.fifo
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- | sed -En 's/.*\( ([0-9]+)%\).*/\1/p' > $XDG_RUNTIME_DIR/wob.fifo

binde = , F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.fifo
binde = , F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.fifo
binde = , F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , F12, exec, brightnessctl set +5% | sed -En 's/.*\( ([0-9]+)%\).*/\1/p' > $XDG_RUNTIME_DIR/wob.fifo
binde = , F11, exec, brightnessctl set 5%- | sed -En 's/.*\( ([0-9]+)%\).*/\1/p' > $XDG_RUNTIME_DIR/wob.fifo

bind = $mainMod, Print, exec, grim ~/Imagenes/Capturas/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Captura Guardada" "Se ha capturado toda la pantalla" -i camera-photo
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" ~/Imagenes/Capturas/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Captura de Área" "El fragmento se ha guardado" -i camera-photo

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
binde = $mainMod CTRL, left, moveactive, -40 0
binde = $mainMod CTRL, right, moveactive, 40 0
binde = $mainMod CTRL, up, moveactive, 0 -40
binde = $mainMod CTRL, down, moveactive, 0 40

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
